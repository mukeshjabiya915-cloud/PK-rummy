<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Rummy - 20 Cards at Once</title>
    <style>
        body { background-color: #1a472a; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .game-title { margin-top: 10px; font-size: 24px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px #000; }
        
        .status-box { background: rgba(0,0,0,0.5); padding: 8px; margin: 5px auto; width: 180px; border-radius: 10px; border: 1px solid #ffd700; }
        .free-spins { color: #00ff00; font-weight: bold; font-size: 18px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px;
            padding: 15px;
            max-width: 350px;
            margin: 0 auto;
        }

        .slot { 
            width: 65px; 
            height: 90px; 
            border: 2px dashed rgba(255,255,255,0.2); 
            border-radius: 8px; 
            position: relative; 
            background: rgba(0,0,0,0.1); 
        }

        /* गिरने का एनीमेशन */
        @keyframes dealAnimation {
            0% { transform: translateY(-600px) rotateX(45deg); opacity: 0; }
            100% { transform: translateY(0) rotateX(0); opacity: 1; }
        }

        .card { 
            width: 60px; height: 85px; background: white; color: black; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px; 
            font-weight: bold; border: 2px solid #000; position: absolute; top: 1px; left: 1px; 
            animation: dealAnimation 0.5s ease-out forwards; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .scatter { background: #ffd700; color: #000; border: 2px solid #fff; box-shadow: 0 0 15px #ffd700; }
        .red { color: red; }

        .controls { position: fixed; bottom: 20px; width: 100%; left: 0; z-index: 100; }
        button { 
            padding: 15px 40px; font-size: 20px; background: linear-gradient(#ffd700, #ff8c00); 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #1a472a; 
            box-shadow: 0 6px #b8860b; 
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="game-title">PK Rummy</div>
    
    <div class="status-box">
        Free Spins: <span id="spin-count" class="free-spins">0</span>
    </div>

    <div class="game-grid" id="main-grid">
        </div>

    <div class="controls">
        <button id="deal-btn" onclick="dealAllCards()">पत्ते सेट करें</button>
    </div>

    <script>
        const grid = document.getElementById('main-grid');
        const totalSlots = 20;
        let freeSpins = 0;

        // खाली स्लॉट्स बनाना
        for (let i = 0; i < totalSlots; i++) {
            const div = document.createElement('div');
            div.className = 'slot';
            div.id = `slot-${i}`;
            grid.appendChild(div);
        }

        function dealAllCards() {
            const btn = document.getElementById('deal-btn');
            btn.disabled = true; // जब तक पत्ते गिर रहे हैं, बटन बंद रखें

            // बोर्ड साफ़ करें
            for (let i = 0; i < totalSlots; i++) {
                document.getElementById(`slot-${i}`).innerHTML = '';
            }

            // एक साथ 20 पत्ते गिराना (हल्के गैप के साथ ताकि मज़ा आए)
            for (let i = 0; i < totalSlots; i++) {
                setTimeout(() => {
                    createCard(i);
                    // जब आखिरी पत्ता गिर जाए, तब रिजल्ट चेक करें
                    if (i === totalSlots - 1) {
                        setTimeout(() => {
                            checkScatters();
                            btn.disabled = false;
                        }, 600);
                    }
                }, i * 50); // हर पत्ते के बीच 50ms का गैप (झड़ी जैसा अहसास)
            }

            if (freeSpins > 0) {
                freeSpins--;
                document.getElementById('spin-count').innerText = freeSpins;
            }
        }

        function createCard(slotId) {
            const slot = document.getElementById(`slot-${slotId}`);
            const suits = ['♠', '♥', '♣', '♦'];
            const values = ['A', 'K', 'Q', 'J', '10', '9'];
            
            let isScatter = Math.random() < 0.10; // 10% चांस
            const card = document.createElement('div');
            
            if (isScatter) {
                card.className = 'card scatter';
                card.innerHTML = 'S';
            } else {
                const suit = suits[Math.floor(Math.random() * 4)];
                const value = values[Math.floor(Math.random() * 6)];
                card.className = 'card';
                if (suit === '♥' || suit === '♦') card.classList.add('red');
                card.innerHTML = value + '<br>' + suit;
            }
            slot.appendChild(card);
        }

        function checkScatters() {
            let scatters = 0;
            for (let i = 0; i < totalSlots; i++) {
                if (document.getElementById(`slot-${i}`).innerHTML.includes('scatter')) {
                    scatters++;
                }
            }

            if (scatters >= 3) {
                alert("बधाई हो! " + scatters + " Scatters मिले। आपको 10 FREE SPINS मिले हैं!");
                freeSpins += 10;
                document.getElementById('spin-count').innerText = freeSpins;
            }
        }
    </script>
</body>
</html>
