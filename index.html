<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Rummy - Animated Cards</title>
    <style>
        body { background-color: #1a472a; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .game-title { margin-top: 10px; font-size: 24px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px #000; }
        
        .status-box { background: rgba(0,0,0,0.5); padding: 8px; margin: 5px auto; width: 180px; border-radius: 10px; border: 1px solid #ffd700; }
        .free-spins { color: #00ff00; font-weight: bold; font-size: 18px; }

        /* 20 स्लॉट्स का ग्रिड */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px;
            padding: 15px;
            max-width: 350px;
            margin: 0 auto;
        }

        .slot { 
            width: 65px; 
            height: 90px; 
            border: 2px dashed rgba(255,255,255,0.2); 
            border-radius: 8px; 
            position: relative; 
            background: rgba(0,0,0,0.1); 
        }

        /* ऊपर से गिरने का एनीमेशन */
        @keyframes dealAnimation {
            0% { transform: translateY(-500px) scale(1.2); opacity: 0; }
            70% { transform: translateY(20px) scale(1.1); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .card { 
            width: 60px; height: 85px; background: white; color: black; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px; 
            font-weight: bold; border: 2px solid #000; position: absolute; top: 1px; left: 1px; 
            animation: dealAnimation 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .scatter { background: #ffd700; color: #000; border: 2px solid #fff; box-shadow: 0 0 15px #ffd700; }
        .red { color: red; }

        .controls { position: fixed; bottom: 20px; width: 100%; left: 0; z-index: 100; }
        button { 
            padding: 15px 40px; font-size: 20px; background: linear-gradient(#ffd700, #ff8c00); 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #1a472a; 
            box-shadow: 0 6px #b8860b; transition: 0.2s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #b8860b; }
    </style>
</head>
<body>

    <div class="game-title">PK Rummy</div>
    
    <div class="status-box">
        Free Spins: <span id="spin-count" class="free-spins">0</span>
    </div>

    <div class="game-grid" id="main-grid">
        </div>

    <div class="controls">
        <button id="deal-btn" onclick="dealWithAnimation()">पत्ते सेट करें</button>
    </div>

    <script>
        const grid = document.getElementById('main-grid');
        const totalSlots = 20;
        let currentSlot = 0;
        let freeSpins = 0;

        for (let i = 0; i < totalSlots; i++) {
            const div = document.createElement('div');
            div.className = 'slot';
            div.id = `slot-${i}`;
            grid.appendChild(div);
        }

        function dealWithAnimation() {
            // बटन को थोड़ी देर के लिए डिसेबल करें ताकि एनीमेशन स्मूथ दिखे
            const btn = document.getElementById('deal-btn');
            btn.disabled = true;
            setTimeout(() => { btn.disabled = false; }, 400);

            const slot = document.getElementById(`slot-${currentSlot}`);
            slot.innerHTML = ''; // पुरानी पत्ती हटाना

            const suits = ['♠', '♥', '♣', '♦'];
            const values = ['A', 'K', 'Q', 'J', '10', '9'];
            
            let isScatter = Math.random() < 0.12; 
            const card = document.createElement('div');
            
            if (isScatter) {
                card.className = 'card scatter';
                card.innerHTML = 'S';
            } else {
                const suit = suits[Math.floor(Math.random() * 4)];
                const value = values[Math.floor(Math.random() * 6)];
                card.className = 'card';
                if (suit === '♥' || suit === '♦') card.classList.add('red');
                card.innerHTML = value + '<br>' + suit;
            }

            slot.appendChild(card);
            
            // पत्ता गिरने के बाद स्कैटर चेक करें
            setTimeout(checkScatters, 600);

            currentSlot = (currentSlot + 1) % totalSlots;

            if (freeSpins > 0) {
                freeSpins--;
                document.getElementById('spin-count').innerText = freeSpins;
            }
        }

        function checkScatters() {
            let scatters = 0;
            for (let i = 0; i < totalSlots; i++) {
                if (document.getElementById(`slot-${i}`).innerHTML.includes('scatter')) {
                    scatters++;
                }
            }

            if (scatters >= 3) {
                alert("धमाका! 3 Scatters मिले! आपको 10 FREE SPINS मिले हैं।");
                freeSpins += 10;
                document.getElementById('spin-count').innerText = freeSpins;
                resetBoard();
            }
        }

        function resetBoard() {
            setTimeout(() => {
                for (let i = 0; i < totalSlots; i++) {
                    document.getElementById(`slot-${i}`).innerHTML = '';
                }
                currentSlot = 0;
            }, 1000);
        }
    </script>
</body>
</html>
